openapi: 3.0.3
info:
  title: Auth Service API
  description: Authentication and Authorization Microservice for the Banking System.
  version: 1.0.0
  contact:
    name: Banking System Team

servers:
  - url: http://localhost:8086

tags:
  - name: Auth
    description: Authentication and Authorization operations

paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /api/v1/auth/validate:
    post:
      tags: [Auth]
      summary: Validate JWT token
      operationId: validate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenResponse'
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

components:
  schemas:
    Role:
      type: string
      enum: [CUSTOMER, ADMIN, ANALYST]
    RegisterRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        email:
          type: string
        customerId:
          type: string
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
    UserResponse:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        customerId:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
