version: '3.8'

services:
  # Infrastructure
  mongodb:
    image: mongo:6.0
    container_name: banking-mongodb
    hostname: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo-data:/data/db
    networks:
      - banking-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: banking-zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - banking-network
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: banking-kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - banking-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Service Registry
  eureka-server:
    build: ./eureka-server
    container_name: banking-eureka
    hostname: eureka-server
    ports:
      - "8761:8761"
    networks:
      - banking-network

  # Config Server
  config-server:
    build: ./config-server
    container_name: banking-config
    hostname: config-server
    ports:
      - "8888:8888"
    depends_on:
      - eureka-server
    networks:
      - banking-network

  # API Gateway
  gateway-service:
    build: ./gateway-service
    container_name: banking-gateway
    hostname: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
      - config-server
    networks:
      - banking-network

  # Business Services
  customer-service:
    build: ./customer-service
    container_name: banking-customer
    hostname: customer-service
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
      - config-server
      - mongodb
    networks:
      - banking-network

  account-service:
    build: ./account-service
    container_name: banking-account
    hostname: account-service
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
      - config-server
      - mongodb
    networks:
      - banking-network

  credit-service:
    build: ./credit-service
    container_name: banking-credit
    hostname: credit-service
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
      - config-server
      - mongodb
    networks:
      - banking-network

  transaction-service:
    build: ./transaction-service
    container_name: banking-transaction
    hostname: transaction-service
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
      - config-server
      - mongodb
      - kafka
    networks:
      - banking-network

  fraud-detection-service:
    build: ./fraud-detection-service
    container_name: banking-fraud
    hostname: fraud-detection-service
    ports:
      - "8085:8085"
    depends_on:
      - eureka-server
      - config-server
      - mongodb
      - kafka
    networks:
      - banking-network

  # Authentication Service
  auth-service:
    build: ./auth-service
    container_name: banking-auth
    hostname: auth-service
    ports:
      - "8086:8086"
    depends_on:
      - eureka-server
      - config-server
      - mongodb
    networks:
      - banking-network

  # Yanki Mobile Wallet Service
  yanki-service:
    build: ./yanki-service
    container_name: banking-yanki
    hostname: yanki-service
    ports:
      - "8088:8088"
    depends_on:
      - eureka-server
      - config-server
      - mongodb
      - kafka
    networks:
      - banking-network

  # Cache
  redis:
    image: redis:7-alpine
    container_name: banking-redis
    hostname: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - banking-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
    driver: local
  zookeeper-data:
    driver: local
  zookeeper-log:
    driver: local
  kafka-data:
    driver: local
  redis-data:
    driver: local

networks:
  banking-network:
    driver: bridge
